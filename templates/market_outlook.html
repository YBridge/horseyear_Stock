<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>市场前瞻 - 宏观微观分析</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e4e6eb;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2em;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header p {
            color: #888;
        }

        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 12px 25px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 25px;
            color: #888;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            text-decoration: none;
        }

        .nav-btn:hover, .nav-btn.active {
            color: #00d4ff;
            background: rgba(0,212,255,0.1);
            border-color: rgba(0,212,255,0.3);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .analysis-section {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 18px;
            color: #00d4ff;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .factor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .factor-card {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 15px;
        }

        .factor-card .label {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
        }

        .factor-card .value {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
        }

        .factor-card .impact {
            font-size: 11px;
            margin-top: 8px;
            padding: 4px 8px;
            border-radius: 10px;
            display: inline-block;
        }

        .impact.positive {
            background: rgba(0,200,83,0.2);
            color: #00c853;
        }

        .impact.negative {
            background: rgba(255,82,82,0.2);
            color: #ff5252;
        }

        .impact.neutral {
            background: rgba(255,255,255,0.1);
            color: #888;
        }

        .prediction-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 25px;
        }

        .prediction-card {
            background: linear-gradient(135deg, rgba(0,212,255,0.1), rgba(123,58,237,0.1));
            border: 1px solid rgba(0,212,255,0.2);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
        }

        .prediction-card .timeframe {
            font-size: 14px;
            color: #888;
            margin-bottom: 15px;
        }

        .prediction-card .trend {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .prediction-card .trend.up {
            color: #00c853;
        }

        .prediction-card .trend.down {
            color: #ff5252;
        }

        .prediction-card .trend.neutral {
            color: #888;
        }

        .prediction-card .confidence {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 15px;
        }

        .prediction-card .factors {
            font-size: 12px;
            color: #888;
            text-align: left;
        }

        .rational-emotional-split {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .split-card {
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            padding: 20px;
        }

        .split-card .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .split-card .header .icon {
            font-size: 24px;
        }

        .split-card .header .title {
            font-size: 16px;
            font-weight: bold;
        }

        .split-card .score {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .split-card .score .label {
            color: #888;
            font-size: 13px;
        }

        .split-card .score .value {
            font-weight: bold;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #888;
        }

        .spinner {
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 每日操作建议卡片 */
        .daily-operation-card {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(123, 44, 191, 0.15));
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .daily-operation-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
        }

        .operation-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .operation-header .tag {
            display: inline-block;
            background: rgba(255,255,255,0.1);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            color: #888;
            margin-bottom: 10px;
        }

        .operation-action {
            font-size: 36px;
            font-weight: bold;
            margin: 15px 0;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .operation-position {
            font-size: 18px;
            color: #aaa;
            margin-top: 5px;
        }

        .operation-score {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .operation-score .score-item {
            text-align: center;
        }

        .operation-score .score-item .label {
            font-size: 11px;
            color: #888;
            margin-bottom: 5px;
        }

        .operation-score .score-item .value {
            font-size: 20px;
            font-weight: bold;
        }

        .operation-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .operation-section {
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            padding: 15px;
        }

        .operation-section .title {
            font-size: 13px;
            color: #00d4ff;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .operation-section .list {
            font-size: 12px;
            line-height: 1.8;
            color: #ccc;
        }

        .operation-section .list div {
            padding: 3px 0;
        }

        .risk-warning {
            background: rgba(255, 82, 82, 0.1);
            border-left: 3px solid #ff5252;
            padding: 12px 15px;
            margin-top: 15px;
            border-radius: 0 10px 10px 0;
            font-size: 12px;
            color: #ff8a80;
        }

        .action-green { color: #00c853; }
        .action-light-green { color: #64dd17; }
        .action-yellow { color: #ffc107; }
        .action-orange { color: #ff9800; }
        .action-red { color: #f44336; }

        @media (max-width: 768px) {
            .prediction-section {
                grid-template-columns: 1fr;
            }
            .rational-emotional-split {
                grid-template-columns: 1fr;
            }
            .operation-action {
                font-size: 28px;
            }
            .operation-details {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌍 市场前瞻分析</h1>
        <p>宏观微观 · 理性情绪 · 趋势预测</p>
    </div>

    <div class="nav-bar">
        <a href="/" class="nav-btn">📊 股票分析</a>
        <a href="/watchlist" class="nav-btn">🎯 关注对比</a>
        <a href="/strategies" class="nav-btn">📝 策略历史</a>
        <a href="/ai_stocks" class="nav-btn">🤖 AI投资</a>
        <a href="/market_outlook" class="nav-btn active">🌍 市场前瞻</a>
    </div>

    <div class="container" id="mainContent">
        <div class="loading">
            <div class="spinner"></div>
            <p>正在分析市场环境...</p>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        async function loadMarketOutlook() {
            const container = document.getElementById('mainContent');

            try {
                const response = await fetch('/api/market_outlook');
                const data = await response.json();

                if (data.success) {
                    renderMarketOutlook(data);
                } else {
                    container.innerHTML = `
                        <div class="loading">
                            <p style="color: #ff6b6b;">分析失败: ${data.error}</p>
                            <button onclick="loadMarketOutlook()" style="margin-top:20px;padding:10px 20px;background:#00d4ff;border:none;border-radius:10px;cursor:pointer;">重试</button>
                        </div>
                    `;
                }
            } catch (error) {
                container.innerHTML = `
                    <div class="loading">
                        <p style="color: #ff6b6b;">网络错误: ${error.message}</p>
                        <button onclick="loadMarketOutlook()" style="margin-top:20px;padding:10px 20px;background:#00d4ff;border:none;border-radius:10px;cursor:pointer;">重试</button>
                    </div>
                `;
            }
        }

        function renderMarketOutlook(data) {
            const outlook = data.outlook;
            const container = document.getElementById('mainContent');

            container.innerHTML = `
                <!-- 每日操作建议 -->
                ${renderDailyOperation(outlook.daily_operation)}

                <!-- 宏观环境分析 -->
                <div class="analysis-section">
                    <div class="section-title">
                        🏛️ 宏观经济环境
                    </div>
                    <div class="factor-grid">
                        ${renderMacroFactors(outlook.macro)}
                    </div>
                </div>

                <!-- 市场情绪分析 -->
                <div class="analysis-section">
                    <div class="section-title">
                        💭 市场情绪指标
                    </div>
                    <div class="factor-grid">
                        ${renderSentimentFactors(outlook.sentiment)}
                    </div>
                </div>

                <!-- 实时新闻分析 -->
                <div class="analysis-section">
                    <div class="section-title">
                        📰 实时新闻动态
                        <button onclick="loadMarketNews()" style="margin-left: auto; padding: 5px 15px; background: rgba(0,212,255,0.2); border: 1px solid rgba(0,212,255,0.3); border-radius: 15px; color: #00d4ff; cursor: pointer; font-size: 12px;">
                            🔄 刷新
                        </button>
                    </div>
                    <div id="newsContent">
                        ${renderNewsSection(outlook.sentiment)}
                    </div>
                </div>

                <!-- 理性情绪分拆 -->
                <div class="analysis-section">
                    <div class="section-title">
                        ⚖️ 理性与情绪分析
                    </div>
                    <div class="rational-emotional-split">
                        ${renderRationalAnalysis(outlook.rational)}
                        ${renderEmotionalAnalysis(outlook.emotional)}
                    </div>
                </div>

                <!-- 趋势预测 -->
                <div class="analysis-section">
                    <div class="section-title">
                        📈 趋势预测
                    </div>
                    <div class="prediction-section">
                        ${renderPrediction(outlook.predictions.one_day, '1天', '明天')}
                        ${renderPrediction(outlook.predictions.three_days, '3天', '未来三天')}
                        ${renderPrediction(outlook.predictions.one_week, '1周', '未来一周')}
                    </div>
                </div>

                <!-- 综合建议 -->
                <div class="analysis-section">
                    <div class="section-title">
                        🎯 综合操作建议
                    </div>
                    <div style="padding: 20px; background: rgba(0,212,255,0.1); border-radius: 15px; text-align: center;">
                        <div style="font-size: 24px; font-weight: bold; margin-bottom: 15px; color: ${getTrendColor(outlook.predictions.one_week.trend)};">
                            ${getTrendIcon(outlook.predictions.one_week.trend)} ${outlook.predictions.one_week.trend === 'up' ? '看涨' : outlook.predictions.one_week.trend === 'down' ? '看跌' : '中性'}
                        </div>
                        <div style="color: #aaa; margin-bottom: 10px;">
                            基于宏观环境 ${outlook.rational.score}/100 + 市场情绪 ${outlook.emotional.score}/100
                        </div>
                        <div style="font-size: 14px; color: #888; max-width: 600px; margin: 0 auto;">
                            ${outlook.recommendation || '建议关注市场动态，根据实际走势调整策略'}
                        </div>
                    </div>
                </div>

                <!-- 更新时间 -->
                <div style="text-align: center; color: #666; font-size: 12px; margin-top: 20px;">
                    分析时间: ${new Date().toLocaleString('zh-CN')}
                </div>
            `;
        }

        function renderMacroFactors(macro) {
            const factors = [
                { label: '利率环境', value: macro.interest_rate || '中性', impact: macro.interest_rate_impact || 'neutral' },
                { label: '通胀水平', value: macro.inflation || '稳定', impact: macro.inflation_impact || 'neutral' },
                { label: 'GDP增长', value: macro.gdp || '正常', impact: macro.gdp_impact || 'neutral' },
                { label: '失业率', value: macro.unemployment || '稳定', impact: macro.unemployment_impact || 'neutral' },
                { label: '政策环境', value: macro.policy || '中性', impact: macro.policy_impact || 'neutral' },
                { label: '地缘政治', value: macro.geopolitical || '稳定', impact: macro.geopolitical_impact || 'neutral' },
            ];

            return factors.map(f => `
                <div class="factor-card">
                    <div class="label">${f.label}</div>
                    <div class="value">${f.value}</div>
                    <div class="impact ${f.impact}">${getImpactText(f.impact)}</div>
                </div>
            `).join('');
        }

        function renderSentimentFactors(sentiment) {
            const factors = [
                { label: 'VIX恐慌指数', value: sentiment.vix || '正常', impact: sentiment.vix_impact || 'neutral' },
                { label: 'Put/Call比率', value: sentiment.put_call_ratio || '1.0', impact: sentiment.put_call_impact || 'neutral' },
                { label: '资金流向', value: sentiment.flow || '中性', impact: sentiment.flow_impact || 'neutral' },
                { label: '市场广度', value: sentiment.breadth || '正常', impact: sentiment.breadth_impact || 'neutral' },
            ];

            return factors.map(f => `
                <div class="factor-card">
                    <div class="label">${f.label}</div>
                    <div class="value">${f.value}</div>
                    <div class="impact ${f.impact}">${getImpactText(f.impact)}</div>
                </div>
            `).join('');
        }

        function renderRationalAnalysis(rational) {
            const factors = rational.factors || [];
            return `
                <div class="split-card">
                    <div class="header">
                        <span class="icon">🧠</span>
                        <span class="title">理性分析 (基本面)</span>
                        <span style="margin-left: auto; color: ${getScoreColor(rational.score)}; font-weight: bold;">
                            ${rational.score || 50}/100
                        </span>
                    </div>
                    ${factors.map(f => `
                        <div class="score">
                            <span class="label">${f.name}</span>
                            <span class="value">${f.value}</span>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderEmotionalAnalysis(emotional) {
            const factors = emotional.factors || [];
            return `
                <div class="split-card">
                    <div class="header">
                        <span class="icon">💭</span>
                        <span class="title">情绪分析 (市场心理)</span>
                        <span style="margin-left: auto; color: ${getScoreColor(emotional.score)}; font-weight: bold;">
                            ${emotional.score || 50}/100
                        </span>
                    </div>
                    ${factors.map(f => `
                        <div class="score">
                            <span class="label">${f.name}</span>
                            <span class="value">${f.value}</span>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderDailyOperation(operation) {
            if (!operation) return '';

            return `
                <div class="daily-operation-card" style="border-color: ${operation.action_color}40;">
                    <!-- 市场状态标题 -->
                    <div class="operation-header">
                        <div class="tag">📅 体系化操作策略</div>
                        <div class="operation-action" style="color: ${operation.action_color}; font-size: 32px;">
                            ${operation.market_state} (${operation.state_strength})
                        </div>
                        <div class="operation-position">
                            当前操作: <strong style="color: ${operation.action_color};">${operation.action}</strong>
                        </div>
                    </div>

                    <!-- 仓位分配 -->
                    <div style="background: rgba(0,0,0,0.3); border-radius: 15px; padding: 20px; margin: 20px 0;">
                        <div style="font-size: 13px; color: #00d4ff; margin-bottom: 15px; font-weight: bold;">💼 仓位配置体系</div>
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
                            <div style="text-align: center;">
                                <div style="font-size: 11px; color: #888;">核心仓位</div>
                                <div style="font-size: 24px; font-weight: bold; color: #00d4ff;">${operation.core_position}</div>
                                <div style="font-size: 10px; color: #666;">基于市场状态</div>
                            </div>
                            <div style="text-align: center;">
                                <div style="font-size: 11px; color: #888;">卫星仓位</div>
                                <div style="font-size: 24px; font-weight: bold; color: #7b2cbf;">${operation.satellite_position}</div>
                                <div style="font-size: 10px; color: #666;">灵活调整</div>
                            </div>
                            <div style="text-align: center;">
                                <div style="font-size: 11px; color: #888;">总仓位</div>
                                <div style="font-size: 24px; font-weight: bold; color: ${operation.action_color};">${operation.total_position}</div>
                                <div style="font-size: 10px; color: #666;">建议上限</div>
                            </div>
                        </div>
                    </div>

                    <!-- 当前状态分析 -->
                    <div class="operation-details">
                        <div class="operation-section">
                            <div class="title">📊 当前市场状态</div>
                            <div class="list">
                                ${operation.status_analysis.map(s => `<div>${s}</div>`).join('')}
                            </div>
                        </div>

                        <div class="operation-section">
                            <div class="title">💡 当前操作建议</div>
                            <div class="list">
                                ${operation.current_advice.map(a => `<div>${a}</div>`).join('')}
                            </div>
                        </div>
                    </div>

                    <!-- 交易规则体系 -->
                    <div style="margin-top: 20px;">
                        <div style="font-size: 13px; color: #00d4ff; margin-bottom: 15px; font-weight: bold;">🎯 交易规则体系</div>
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px;">
                            <!-- 进场条件 -->
                            ${operation.entry_conditions.length > 0 ? `
                            <div style="background: rgba(0,200,83,0.1); border-radius: 12px; padding: 15px;">
                                <div style="font-size: 12px; color: #00c853; margin-bottom: 10px; font-weight: bold;">📈 进场条件 (满足2个)</div>
                                <div style="font-size: 11px; color: #ccc; line-height: 1.8;">
                                    ${operation.entry_conditions.map(c => `<div>${c}</div>`).join('')}
                                </div>
                            </div>
                            ` : ''}

                            <!-- 离场条件 -->
                            ${operation.exit_conditions.length > 0 ? `
                            <div style="background: rgba(244,67,54,0.1); border-radius: 12px; padding: 15px;">
                                <div style="font-size: 12px; color: #f44336; margin-bottom: 10px; font-weight: bold;">📉 离场条件 (满足1个)</div>
                                <div style="font-size: 11px; color: #ccc; line-height: 1.8;">
                                    ${operation.exit_conditions.map(c => `<div>${c}</div>`).join('')}
                                </div>
                            </div>
                            ` : ''}

                            <!-- 加仓条件 -->
                            ${operation.add_conditions.length > 0 ? `
                            <div style="background: rgba(33,150,243,0.1); border-radius: 12px; padding: 15px;">
                                <div style="font-size: 12px; color: #2196f3; margin-bottom: 10px; font-weight: bold;">➕ 加仓条件</div>
                                <div style="font-size: 11px; color: #ccc; line-height: 1.8;">
                                    ${operation.add_conditions.map(c => `<div>${c}</div>`).join('')}
                                </div>
                            </div>
                            ` : ''}

                            <!-- 减仓条件 -->
                            ${operation.reduce_conditions.length > 0 ? `
                            <div style="background: rgba(255,152,0,0.1); border-radius: 12px; padding: 15px;">
                                <div style="font-size: 12px; color: #ff9800; margin-bottom: 10px; font-weight: bold;">➖ 减仓条件</div>
                                <div style="font-size: 11px; color: #ccc; line-height: 1.8;">
                                    ${operation.reduce_conditions.map(c => `<div>${c}</div>`).join('')}
                                </div>
                            </div>
                            ` : ''}
                        </div>
                    </div>

                    <!-- 风险控制 -->
                    <div style="margin-top: 20px; background: rgba(255,82,82,0.1); border-radius: 12px; padding: 15px;">
                        <div style="font-size: 12px; color: #ff5252; margin-bottom: 10px; font-weight: bold;">🛡️ 风险控制体系</div>
                        <div style="font-size: 11px; color: #ccc; line-height: 1.8;">
                            ${operation.risk_controls.map(r => `<div>${r}</div>`).join('')}
                        </div>
                    </div>

                    <!-- 重要提示 -->
                    <div style="margin-top: 20px; padding: 15px; background: rgba(0,212,255,0.1); border-radius: 10px; text-align: center; font-size: 12px; color: #aaa;">
                        <strong style="color: #00d4ff;">体系化策略说明：</strong>核心仓位基于市场状态，不轻易改变；卫星仓位基于短期信号灵活调整。<br>
                        进场离场遵循明确规则，避免情绪化决策。本建议仅供参考，投资有风险，入市需谨慎。
                    </div>
                </div>
            `;
        }

        function renderPrediction(pred, timeframe, label) {
            const trendClass = pred.trend || 'neutral';
            const trendText = pred.trend === 'up' ? '看涨 📈' : pred.trend === 'down' ? '看跌 📉' : '中性 ➡️';

            return `
                <div class="prediction-card">
                    <div class="timeframe">${label}</div>
                    <div class="trend ${trendClass}">${trendText}</div>
                    <div class="confidence">信心: ${pred.confidence || '中等'}</div>
                    <div class="factors">
                        <div style="margin-bottom: 10px;"><strong>关键因素:</strong></div>
                        ${(pred.factors || []).map(f => `<div>• ${f}</div>`).join('')}
                    </div>
                </div>
            `;
        }

        function getImpactText(impact) {
            const map = {
                'positive': '利好',
                'negative': '利空',
                'neutral': '中性'
            };
            return map[impact] || '中性';
        }

        function getTrendColor(trend) {
            if (trend === 'up') return '#00c853';
            if (trend === 'down') return '#ff5252';
            return '#888';
        }

        function getTrendIcon(trend) {
            if (trend === 'up') return '📈';
            if (trend === 'down') return '📉';
            return '➡️';
        }

        function getScoreColor(score) {
            if (score >= 60) return '#00c853';
            if (score >= 40) return '#ffc107';
            return '#ff5252';
        }

        function renderNewsSection(sentiment) {
            const news = sentiment.news || {};
            const recentHeadlines = news.recent_headlines || [];
            const hotTopics = news.hot_topics || [];
            const summary = news.summary || '暂无新闻数据';
            const score = news.score || 50;

            // 确定情绪颜色
            const sentimentColor = score > 55 ? '#00c853' : score < 45 ? '#ff5252' : '#ffc107';
            const sentimentText = score > 55 ? '偏多' : score < 45 ? '偏空' : '中性';

            let newsHtml = `
                <div class="factor-grid" style="margin-bottom: 20px;">
                    <div class="factor-card" style="grid-column: span 2;">
                        <div class="label">市场情绪</div>
                        <div class="value" style="color: ${sentimentColor}; font-size: 18px;">
                            ${sentimentText} (${score}/100)
                        </div>
                        <div class="impact ${score > 55 ? 'positive' : score < 45 ? 'negative' : 'neutral'}">
                            ${news.positive_count || 0}条利好 vs ${news.negative_count || 0}条利空
                        </div>
                    </div>
                </div>

                <div style="margin-bottom: 20px;">
                    <div style="font-size: 13px; color: #888; margin-bottom: 10px;">新闻摘要</div>
                    <div style="color: #ccc; line-height: 1.6;">${summary}</div>
                </div>

                ${hotTopics.length > 0 ? `
                <div style="margin-bottom: 20px;">
                    <div style="font-size: 13px; color: #888; margin-bottom: 10px;">🔥 热点话题</div>
                    <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                        ${hotTopics.map(t => `<span class="impact ${news.positive_count > news.negative_count ? 'positive' : 'neutral'}">${t}</span>`).join('')}
                    </div>
                </div>
                ` : ''}

                ${recentHeadlines.length > 0 ? `
                <div>
                    <div style="font-size: 13px; color: #888; margin-bottom: 15px;">📰 最新头条</div>
                    <div style="max-height: 200px; overflow-y: auto;">
                        ${recentHeadlines.map((title, i) => `
                            <div style="padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05);">
                                <div style="font-size: 13px; color: #ddd;">${title}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                ` : '<div style="color: #666; font-size: 13px; padding: 20px; text-align: center;">暂无新闻数据</div>'}
            `;

            return newsHtml;
        }

        async function loadMarketNews() {
            const newsContent = document.getElementById('newsContent');
            newsContent.innerHTML = '<div class="loading"><div class="spinner" style="width:30px;height:30px;margin:0 auto 10px;"></div><p style="font-size:12px;">正在加载新闻...</p></div>';

            try {
                const response = await fetch('/api/market_news');
                const data = await response.json();

                if (data.success) {
                    // 更新sentiment数据
                    if (window.currentOutlookData) {
                        window.currentOutlookData.sentiment = data.sentiment;
                    }
                    newsContent.innerHTML = renderNewsSection({news: data});
                } else {
                    newsContent.innerHTML = '<div style="color: #ff6b6b; padding: 20px; text-align: center;">加载失败</div>';
                }
            } catch (error) {
                console.error('新闻加载失败:', error);
                newsContent.innerHTML = '<div style="color: #ff6b6b; padding: 20px; text-align: center;">网络错误</div>';
            }
        }

        // 页面加载时执行
        loadMarketOutlook();
    </script>
</body>
</html>
